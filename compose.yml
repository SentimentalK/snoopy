services:
  app:
    build:
      context: .
      target: dev
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules

  web:
    profiles:
      - prod
    build:
      context: .
      target: prod
    ports:
      - "8080:80"
